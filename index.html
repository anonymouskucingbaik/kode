<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Ujian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 28px;
            color: #333;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .token-box {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .token-text {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .loading {
            font-size: 16px;
            color: #999;
        }

        .error {
            font-size: 14px;
            color: #e74c3c;
            font-style: italic;
        }

        .placeholder {
            font-size: 16px;
            color: #bbb;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            animation-play-state: paused;
        }

        .btn:disabled .icon {
            animation-play-state: running;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Token Ujian</h1>
        
        <div class="token-box">
            <div id="tokenDisplay" class="placeholder">Tekan refresh</div>
        </div>

        <button id="refreshBtn" class="btn" onclick="fetchToken()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36M20.49 15a9 9 0 0 1-14.85 3.36"></path>
            </svg>
            Refresh
        </button>

        <div class="info">
            Auto-refresh saat page dimuat
        </div>
    </div>

    <script>
        const tokenDisplay = document.getElementById('tokenDisplay');
        const refreshBtn = document.getElementById('refreshBtn');

        async function fetchToken() {
            refreshBtn.disabled = true;
            tokenDisplay.className = 'loading';
            tokenDisplay.textContent = 'Memuat...';

            try {
                // // OPSI 1: Jika API support CORS (uncomment jika bisa)
                 const response = await fetch('https://mydeena.com/70k3n.php');
                
                // OPSI 2: Gunakan backend proxy (RECOMMENDED)
                // Ganti dengan URL backend Anda yang proxy ke mydeena.com
                //const response = await fetch('./token.json');
                
                if (!response.ok) throw new Error('Gagal fetch');
                
                const data = await response.json();
                console.log(data)
                tokenDisplay.className = 'token-text';
                tokenDisplay.textContent = data.token_ujian;
            } catch (error) {
                tokenDisplay.className = 'error';
                tokenDisplay.textContent = '⚠️ Gagal mengambil token';
                console.error('Error:', error);
            } finally {
                refreshBtn.disabled = false;
            }
        }

        // Fetch otomatis saat page load
        window.addEventListener('load', fetchToken);
    </script>
</body>
</html>
